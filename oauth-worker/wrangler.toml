name = "gds-product-map-oauth"
main = "worker.js"
compatibility_date = "2025-01-01"

# The app's origin. postMessage is targeted only at this origin.
[vars]
ALLOWED_ORIGIN = "https://maxwellriess.github.io"

# Secrets are NOT stored here. Set them once after first deploy:
#   wrangler secret put GITHUB_CLIENT_ID
#   wrangler secret put GITHUB_CLIENT_SECRET
